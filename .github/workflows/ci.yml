# CI for usecomputer: build native Zig binaries per platform,
# then publish to npm on push to main.
#
# macOS arm64 + x64 are built on macos-latest (Apple Silicon).
# Zig cross-compiles x86_64-macos from ARM fine since both
# use the same macOS SDK. macos-13 (Intel) runners are retired.
#
# linux-x64 is built on ubuntu-latest because linkSystemLibrary
# needs X11/Xext/Xtst/png headers from the system.

name: usecomputer CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: usecomputer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native darwin-arm64
        run: pnpm tsx scripts/build.ts darwin-arm64

      - name: Build native darwin-x64
        run: pnpm tsx scripts/build.ts darwin-x64

      - name: Upload darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-arm64
          path: dist/darwin-arm64/usecomputer.node

      - name: Upload darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-x64
          path: dist/darwin-x64/usecomputer.node

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install X11 and PNG dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxtst-dev libpng-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native linux-x64
        run: pnpm tsx scripts/build.ts linux-x64

      - name: Upload linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: dist/linux-x64/usecomputer.node

  publish:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: dist/darwin-arm64/

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: dist/darwin-x64/

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: dist/linux-x64/

      - name: List dist contents
        run: ls -laR dist/

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm show usecomputer version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
