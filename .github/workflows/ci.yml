# CI for usecomputer: build native Zig binaries per platform,
# then publish to npm on push to main.
#
# macOS arm64 + x64 are built on macos-latest (Apple Silicon).
# Zig cross-compiles x86_64-macos from ARM fine since both
# use the same macOS SDK. macos-13 (Intel) runners are retired.
#
# linux-x64 is built natively on ubuntu-latest (x64).
# linux-arm64 is built natively on ubuntu-24.04-arm (ARM64).
# Both need X11/Xext/Xtst/png headers from the system — Zig's
# linkSystemLibrary requires target-arch headers, so cross-compiling
# from x64 doesn't work (only glibc is bundled, not X11/png).
#
# win32-x64 is built on windows-latest.
#
# Each platform also builds the C API shared library (libusecomputer_c).
# On publish, all executables and libraries are uploaded to the
# matching GitHub release (v$VERSION).

name: usecomputer CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: usecomputer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native darwin-arm64
        run: pnpm tsx scripts/build.ts darwin-arm64

      - name: Build native darwin-x64
        run: pnpm tsx scripts/build.ts darwin-x64

      - name: Build C API darwin-arm64
        run: |
          if [ -d /Library/Developer/CommandLineTools ]; then
            export DEVELOPER_DIR=/Library/Developer/CommandLineTools
          fi
          zig build c-api -Doptimize=ReleaseFast
          cp zig-out/lib/libusecomputer_c.dylib dist/darwin-arm64/
          cp zig-out/include/usecomputer.h dist/darwin-arm64/

      - name: Build C API darwin-x64
        run: |
          if [ -d /Library/Developer/CommandLineTools ]; then
            export DEVELOPER_DIR=/Library/Developer/CommandLineTools
          fi
          zig build c-api -Doptimize=ReleaseFast -Dtarget=x86_64-macos
          cp zig-out/lib/libusecomputer_c.dylib dist/darwin-x64/
          cp zig-out/include/usecomputer.h dist/darwin-x64/

      - name: Upload darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-arm64
          path: dist/darwin-arm64/

      - name: Upload darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-x64
          path: dist/darwin-x64/

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install X11 and PNG dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxtst-dev libpng-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native linux-x64
        run: pnpm tsx scripts/build.ts linux-x64

      - name: Build C API linux-x64
        run: |
          zig build c-api -Doptimize=ReleaseFast
          cp zig-out/lib/libusecomputer_c.so dist/linux-x64/
          cp zig-out/include/usecomputer.h dist/linux-x64/

      - name: Upload linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: dist/linux-x64/

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install X11 and PNG dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxtst-dev libpng-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native linux-arm64
        run: pnpm tsx scripts/build.ts linux-arm64

      - name: Build C API linux-arm64
        run: |
          zig build c-api -Doptimize=ReleaseFast
          cp zig-out/lib/libusecomputer_c.so dist/linux-arm64/
          cp zig-out/include/usecomputer.h dist/linux-arm64/

      - name: Upload linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: dist/linux-arm64/

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build native win32-x64
        run: pnpm tsx scripts/build.ts win32-x64

      - name: Build C API win32-x64
        shell: bash
        run: |
          zig build c-api -Doptimize=ReleaseFast
          # On Windows zig puts DLLs in zig-out/bin/, import libs in zig-out/lib/
          cp zig-out/bin/usecomputer_c.dll dist/win32-x64/
          cp zig-out/lib/usecomputer_c.lib dist/win32-x64/ 2>/dev/null || true
          cp zig-out/include/usecomputer.h dist/win32-x64/

      - name: Build TypeScript
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Upload win32-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-win32-x64
          path: dist/win32-x64/

  publish:
    needs: [build-macos, build-linux, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write  # needed for gh release upload

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: dist/darwin-arm64/

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: dist/darwin-x64/

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: dist/linux-x64/

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: dist/linux-arm64/

      - name: Download win32-x64
        uses: actions/download-artifact@v4
        with:
          name: native-win32-x64
          path: dist/win32-x64/

      - name: List dist contents
        run: ls -laR dist/

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm show usecomputer version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version-check.outputs.package_version }}"
          TAG="v${VERSION}"

          # Check if this release tag exists, skip upload if not
          if ! gh release view "$TAG" &>/dev/null; then
            echo "No release found for ${TAG}, skipping upload"
            exit 0
          fi

          # Create platform tarballs (exe + c-api lib + header)
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            tar -czf "usecomputer-${TAG}-${platform}.tar.gz" -C "dist/${platform}" .
          done

          # Create zip for Windows
          (cd dist/win32-x64 && zip -r "../../usecomputer-${TAG}-win32-x64.zip" .)

          # Upload header separately (platform-independent)
          cp dist/darwin-arm64/usecomputer.h usecomputer.h

          echo "Uploading release assets to ${TAG}..."
          gh release upload "$TAG" \
            "usecomputer-${TAG}-darwin-arm64.tar.gz" \
            "usecomputer-${TAG}-darwin-x64.tar.gz" \
            "usecomputer-${TAG}-linux-x64.tar.gz" \
            "usecomputer-${TAG}-linux-arm64.tar.gz" \
            "usecomputer-${TAG}-win32-x64.zip" \
            usecomputer.h \
            --clobber
